name: Server image (main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push server image
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Resolve image name and tag
        id: meta
        env:
          IMAGE_TAG: ${{ vars.IMAGE_TAG }}
        run: |
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::The 'main' environment must define an IMAGE_TAG variable (Settings > Environments > main > Environment variables)."
            exit 1
          fi
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/framekeeper-server" >> "$GITHUB_OUTPUT"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
